services:
  server:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - AI_PROVIDER=mock
      - JWT_SECRET=ruyi-ai-admin-secret-change-me
      - DB_DSN=/app/data/app.db
    volumes:
      - server-data:/app/data
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server-data:
